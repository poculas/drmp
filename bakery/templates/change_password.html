{% extends 'base.html' %}
{% load static %}

{% block title %}Change Password - Dough Re Mi Patisserie{% endblock %}

{% block content %}
    <section>
        <div class="registration">
            <h1>Change Password</h1>
            <p>Please enter your current password to set a new password.</p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" name="change_password" id="submit"><h3>Change Password</h3></button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="{% url 'profile' %}" style="color: #ff6b6b; text-decoration: none;">Cancel</a>
                </div>
            </form>
        </div>
    </section>
{% endblock %}
